# Configuration for flavours
# https://github.com/Misterio77/flavours
#
# Example config and default values
#
# [[item]]
# file = '~/.config/example' (file to inject to, supports tilde and env var expansion. required)
# template = 'example' (template to use. required)
# subtemplate = 'default' (subtemplate to use)
# rewrite = false (should we rewrite the entire file?)
# start = '# Start flavours' (if not rewriting, where to start replacing)
# end = '# End flavours' (if not rewriting, where to stop replacing)
# hook = '' (command to execute after injecting)
#
# Example for i3
#
# [[item]]
# file = '~/.config/i3/config'
# template = 'i3'
# subtemplate = 'colors'
# hook = 'i3-msg reload'
# rewrite = false

[[item]]
file = '~/.Xresources'
template = 'xresources'
subtemplate = 'default'
rewrite = true

[[item]]
file = '~/.config/termite/config'
template = 'termite'
rewrite = false

[[item]]
file = '~/.config/rofi/base16-main.rasi'
template = 'rofi'
rewrite = true

[[item]]
file = '~/.config/qutebrowser/config.py'
template = 'qutebrowser'
subtemplate = 'minimal'

# [[item]]
# file= '~/.config/zathura/zathurarc'
# template = 'zathura'

[[item]]
file= '~/.config/zsh/.zshrc'
template = 'fzf'
rewrite = false

[[item]]
file= '~/.emacs.d/themes/base16-main-theme.el'
template = 'emacs'
rewrite = true

[[item]]
file = '~/.config/discocss/custom.css'
template = 'styles'
subtemplate = 'css-variables'
rewrite = false
start= '/* Start flav */'
end = '/* End flav */'
