font=Iosevka Custom:size=14, Iosevka Nerd Font:size=14
pad=20x20

bold-text-in-bright=yes
bell=none
selection-target=primary

[cursor]
style=bar
blink=no

[colors]
alpha=1.0
foreground=947e68
background=201e1a
regular0=322b28 # black
regular1=6d413b # red
regular2=6a7253 # yellow
regular3=7e5d3c # green
regular4=527272 # blue
regular5=6c4949 # magenta
regular6=3f5c5c # cyan
regular7=867564 # white
bright0=473d3a # bright black
bright1=5e4643 # bright red
bright2=484a41 # bright green
bright3=6b5a48 # bright yellow
bright4=535a5a # bright blue
bright5=4f4141 # bright magenta
bright6=515c5c # bright cyan
bright7=928374 # bright white

[key-bindings]
scrollback-up-line=Mod1+K
scrollback-down-line=Mod1+J
clipboard-copy=Mod1+C
clipboard-paste=Mod1+V
search-start=Control+F
font-increase=Mod1+Shift+K
font-decrease=Mod1+Shift+J
