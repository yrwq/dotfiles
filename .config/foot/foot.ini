font=Iosevka Custom:size=14, Iosevka Nerd Font:size=14
pad=20x20

bold-text-in-bright=yes
bell=none
selection-target=primary

[cursor]
style=bar
blink=no

[colors]
alpha=1.0
foreground=d4be98
background=212121
regular0=32302f # black
regular1=ea6962 # red
regular2=a9b665 # yellow
regular3=e78a4e # green
regular4=7daea3 # blue
regular5=d3869b # magenta
regular6=89b482 # cyan
regular7=d4be98 # white
bright0=544b45 # bright black
bright1=e0362c # bright red
bright2=a3b63e # bright green
bright3=e76f22 # bright yellow
bright4=3bae94 # bright blue
bright5=e2527a # bright magenta
bright6=60b452 # bright cyan
bright7=b69b6c # bright white

[key-bindings]
scrollback-up-line=Mod1+K
scrollback-down-line=Mod1+J
clipboard-copy=Mod1+C
clipboard-paste=Mod1+V
search-start=Control+F
font-increase=Mod1+Shift+K
font-decrease=Mod1+Shift+J
