shadow = true;
shadow-radius = 8;
shadow-opacity = .5
shadow-offset-x = -15;
shadow-offset-y = 5;

shadow-exclude = [
    "n:e:Notification",
    "name = 'Notification'",
    "class_g = 'Conky'",
    "class_g ?= 'Notify-osd'",
    "class_g = 'Cairo-clock'",
    "class_g = 'slop'",
    "_GTK_FRAME_EXTENTS@:c",
    "_NET_WM_WINDOW_TYPE:a = '_NET_WM_WINDOW_TYPE_NOTIFICATION'"

];

fading = true
fade-in-step = 0.03;
fade-out-step = 0.03;

inactive-opacity = 1;
frame-opacity = 1;
inactive-opacity-override = true;

inactive-dim = 0.09

backend = "xrender";

vsync = true

mark-wmwin-focused = true;
mark-ovredir-focused = true;

detect-rounded-corners = true;
detect-client-opacity = true;

refresh-rate = 0
detect-transient = true
detect-client-leader = true
use-damage = true
log-level = "warn";

wintypes:
{
    tooltip = { fade = true; shadow = true; opacity = 0.75; focus = true; full-shadow = false; };
    dock = { shadow = false; }
    dnd = { shadow = false; }
    popup_menu = { opacity = 0.8; }
    dropdown_menu = { opacity = 0.8; }
};
